version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      tauri:
        patterns: ["@tauri-apps/*"]

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      tauri:
        patterns: ["tauri", "tauri-*", "specta", "specta-*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
