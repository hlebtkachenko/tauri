name: upstream-watch

# Weekly check: is the `tauri` crate behind its latest release? If so, open or
# update a tracking issue with the changelog link. Dependabot bumps the version;
# this surfaces awareness + breaking-change context. Also runnable on demand.
on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compare installed Tauri to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          installed=$(grep -A1 '^name = "tauri"$' src-tauri/Cargo.lock | grep '^version' | head -1 | cut -d'"' -f2)
          latest=$(curl -fsSL -H "User-Agent: tauri-upstream-watch (github actions)" \
            https://crates.io/api/v1/crates/tauri | jq -r '.crate.max_stable_version')
          echo "installed=$installed latest=$latest"

          if [ -z "$installed" ] || [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "Could not determine versions; skipping."
            exit 0
          fi
          if [ "$installed" = "$latest" ]; then
            echo "Up to date."
            exit 0
          fi

          title="Upstream: Tauri $latest available (installed $installed)"
          body=$(printf 'The tauri crate %s is out; this repo is on %s.\n\n- Changelog: https://github.com/tauri-apps/tauri/releases\n- Dependabot should also open a bump PR; review breaking changes before merging.\n\nOpened automatically by .github/workflows/upstream-watch.yml.' "$latest" "$installed")

          existing=$(gh issue list --state open --search "Upstream: Tauri in:title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body "$body"
            echo "Updated issue #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi
